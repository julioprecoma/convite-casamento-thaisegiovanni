<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Convite de Casamento</title>
<style>
:root{
  --bg:#f7f0ec;
  --paper:#fffaf4;
  --ink:#765683;
  --line:#9a829e;
  --shadow:rgba(70,48,75,.16);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Georgia,'Times New Roman',serif;background:var(--bg);color:var(--ink)}
body{overflow:hidden}
a{color:inherit;text-decoration:none}
.app{position:relative;width:100vw;height:100svh;overflow:hidden;background:linear-gradient(135deg,#fbfaf7 0%,#f9f0ee 45%,#f2e4ef 100%)}
.screen{position:absolute;inset:0;transition:opacity 900ms ease,transform 900ms ease}

/* folhas decorativas */
.leaf{position:absolute;pointer-events:none;opacity:.30}
.leaf::before{content:"";position:absolute;left:50%;top:0;width:1.2px;height:100%;background:rgba(118,86,131,.28);transform:rotate(10deg)}
.leaf span{position:absolute;width:42px;height:20px;border-radius:50%;background:rgba(137,103,146,.22);transform:rotate(var(--r));left:var(--x);top:var(--y)}
.leaf-left{left:-18px;bottom:2%;width:120px;height:320px;transform:rotate(-18deg)}
.leaf-right{right:-14px;top:7%;width:120px;height:330px;transform:rotate(14deg)}
.leaf-menu{right:-18px;top:4%;width:120px;height:86%;transform:rotate(12deg);opacity:.25;z-index:5}

/* abertura */
.opening{display:flex;align-items:center;justify-content:center;padding:4svh 0;z-index:20;background:linear-gradient(135deg,#fbfaf7 0%,#f9f0ee 48%,#f1e2ef 100%)}
.opening-inner{position:relative;width:100vw;height:100svh;max-width:520px;display:flex;align-items:center;justify-content:center;flex-direction:column;overflow:hidden}
.envelope-wrap{position:relative;width:118vw;max-width:620px;aspect-ratio:1.02/1;transform:translateY(-3svh);filter:drop-shadow(0 14px 18px rgba(60,45,64,.14));cursor:pointer;transition:transform 900ms ease,opacity 850ms ease}
.envelope{position:absolute;inset:0;background:linear-gradient(180deg,#fffaf4 0%,#f8ecdf 100%);border:1px solid rgba(125,93,134,.38);overflow:hidden}
.envelope::before{content:"";position:absolute;inset:0;background:linear-gradient(140deg,transparent 49.7%,rgba(125,93,134,.55) 50%,transparent 50.3%),linear-gradient(220deg,transparent 49.7%,rgba(125,93,134,.55) 50%,transparent 50.3%),linear-gradient(35deg,rgba(245,226,206,.60) 0 49.5%,transparent 50%),linear-gradient(-35deg,rgba(246,232,215,.75) 0 49.5%,transparent 50%);}
.flap{position:absolute;left:0;right:0;top:0;height:52%;background:linear-gradient(180deg,#fffdf8 0%,#fbf0e6 100%);clip-path:polygon(0 0,100% 0,50% 100%);border-top:1px solid rgba(125,93,134,.38);transform-origin:top center;transition:transform 1s cubic-bezier(.2,.8,.2,1);z-index:4}
.seal{position:absolute;left:50%;top:50%;width:92px;height:92px;border-radius:50%;transform:translate(-50%,-50%);background:radial-gradient(circle at 36% 32%,#b58fc0 0%,#8a6099 58%,#735083 100%);box-shadow:0 5px 14px rgba(57,40,66,.26), inset 0 0 0 8px rgba(95,62,110,.25), inset 0 0 0 13px rgba(255,255,255,.08);z-index:8;transition:opacity .45s ease,transform .6s ease}
.seal::after{content:'✤';position:absolute;inset:0;display:grid;place-items:center;color:#ead9ee;font-size:30px;line-height:1}
.open-copy{position:absolute;bottom:11svh;left:0;right:0;text-align:center;letter-spacing:.38em;font-size:clamp(13px,2.8vw,18px);color:var(--ink)}
.open-copy::before{content:'✤';display:block;font-size:22px;letter-spacing:0;margin-bottom:18px;color:#80558d}
.app.open .opening{opacity:0;transform:scale(.96);pointer-events:none}
.app.open .flap{transform:rotateX(72deg)}
.app.open .seal{opacity:0;transform:translate(-50%,-50%) scale(.86)}

/* Marco 0 menu */
.menu-screen{z-index:10;opacity:0;pointer-events:none;overflow:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:linear-gradient(135deg,#fbfaf7 0%,#faf1ef 46%,#f2e3ef 100%)}
.menu-screen::-webkit-scrollbar{display:none}
.app.open .menu-screen{opacity:1;pointer-events:auto}
.scene{position:relative;width:100%;min-height:100svh;overflow:hidden}

.menu-list{position:absolute;z-index:8;display:flex;flex-direction:column;gap:8px}
.menu-card{height:40px;border:1.15px solid rgba(116,84,124,.62);border-radius:12px;background:rgba(255,250,244,.88);box-shadow:0 8px 16px rgba(75,55,83,.10);display:grid;grid-template-columns:36px 1px 1fr 18px;align-items:center;overflow:hidden;backdrop-filter:blur(1.5px);opacity:0;transform:translateX(14px);animation:showItem .52s ease forwards;animation-delay:calc(.08s * var(--i) + .25s)}
.icon{display:grid;place-items:center;color:var(--ink)}
.icon svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.sep{height:23px;background:rgba(126,99,132,.27)}
.txt{font-size:11px;text-transform:uppercase;letter-spacing:.16em;padding-left:10px;white-space:nowrap}
.arr{font-size:23px;line-height:1;text-align:center;color:#896b92;padding-bottom:2px}
@keyframes showItem{to{opacity:1;transform:translateX(0)}}

/* retrato: a arte inteira vira composição, menu ocupa faixa menor à direita */
@media (orientation:portrait){
  .scene{min-height:max(100svh,760px)}
  .church-bg{background-size:auto 88%;background-position:26% 72%}
  .menu-list{top:18%;right:4.4%;width:42vw;max-width:184px;min-width:156px}
  .leaf-menu{right:-36px;top:2%;height:88%}
}
@media (max-width:390px) and (orientation:portrait){
  .menu-list{width:43vw;right:3.2%;min-width:150px;gap:7px;top:17%}
  .menu-card{height:38px;grid-template-columns:33px 1px 1fr 17px;border-radius:11px}
  .txt{font-size:10px;letter-spacing:.12em;padding-left:8px}
  .icon svg{width:17px;height:17px}
}
@media (max-height:720px) and (orientation:portrait){
  .scene{min-height:760px}
  .menu-list{top:13%;gap:6px}
  .menu-card{height:36px}
}

/* paisagem: igreja como fundo dominante, menu dentro da arte ocupando cerca de 30% */
@media (orientation:landscape){
  .opening-inner{max-width:none}
  .envelope-wrap{width:82vw;max-width:980px;aspect-ratio:2.05/1;transform:translateY(-1svh)}
  .open-copy{bottom:8svh}
  .scene{height:100svh;min-height:100svh}
  .church-bg{background-size:70vw auto;background-position:8% center;opacity:.60}
  .wash{background:linear-gradient(90deg,rgba(255,255,255,.02),rgba(255,252,247,.10) 54%,rgba(247,235,246,.52))}
  .menu-list{top:6%;right:5%;width:30vw;max-width:320px;min-width:250px;gap:6px}
  .menu-card{height:36px;border-radius:9px;grid-template-columns:38px 1px 1fr 22px}
  .txt{font-size:clamp(10px,1.15vw,14px);letter-spacing:.14em;padding-left:12px}
  .icon svg{width:18px;height:18px}
  .arr{font-size:22px}
  .leaf-menu{right:1vw;top:4%;height:90%;opacity:.22}
}
</style>
</head>
