<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Convite de Casamento</title>
  <style>
    :root{
      --bg:#f7f0eb;
      --cream:#fff8ee;
      --cream-2:#f3e6d8;
      --purple:#7b5a83;
      --purple-soft:#b99fbc;
      --line:rgba(105,76,111,.55);
      --shadow:0 22px 45px rgba(73,52,76,.15);
      --radius:15px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:Georgia,'Times New Roman',serif;color:var(--purple)}
    body{min-height:100svh}
    a{color:inherit;text-decoration:none}
    .app{position:relative;width:100vw;height:100svh;overflow:hidden;background:
      radial-gradient(circle at 13% 10%,rgba(255,255,255,.95),transparent 35%),
      radial-gradient(circle at 86% 72%,rgba(215,195,218,.35),transparent 40%),
      linear-gradient(155deg,#fbf8f4 0%,#f2e8e3 70%,#eee0ec 100%);
    }
    .paper-texture{position:absolute;inset:0;opacity:.35;background-image:linear-gradient(90deg,rgba(255,255,255,.16) 1px,transparent 1px),linear-gradient(rgba(115,93,105,.04) 1px,transparent 1px);background-size:7px 7px;pointer-events:none;mix-blend-mode:multiply}
    .leaf{position:absolute;width:110px;height:240px;opacity:.28;pointer-events:none;z-index:3}
    .leaf::before{content:"";position:absolute;left:51px;top:0;width:1.5px;height:100%;background:rgba(122,90,131,.35);transform:rotate(12deg);transform-origin:bottom}
    .leaf span{position:absolute;width:34px;height:14px;border-radius:50%;background:rgba(139,105,147,.35);transform:rotate(var(--r));left:var(--x);top:var(--y)}
    .leaf-left{left:-12px;bottom:12%;transform:rotate(-28deg) scale(1.05)}
    .leaf-right{right:-5px;top:7%;transform:rotate(18deg) scale(1.18)}
    .leaf-menu{right:-18px;top:18%;height:70%;opacity:.42;transform:rotate(10deg) scale(1.15)}

    .screen{position:absolute;inset:0;transition:opacity .9s ease, transform .9s ease;}
    .splash{display:flex;align-items:center;justify-content:center;z-index:20;padding:7svh 6vw 5svh;cursor:pointer;}
    .splash-inner{position:relative;width:min(90vw,470px);height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5svh;}
    .envelope-stage{position:relative;width:min(103vw,520px);height:min(68svh,760px);display:flex;align-items:center;justify-content:center;}
    .envelope{position:relative;width:100%;height:78%;min-height:430px;filter:drop-shadow(0 25px 26px rgba(69,48,72,.16));transform-origin:center;transition:transform 1s cubic-bezier(.22,.75,.16,1),opacity .7s ease;}
    .env-panel{position:absolute;inset:0;background:linear-gradient(160deg,#fffaf0,#f3e5d5);border:1.25px solid var(--line);box-shadow:inset 0 0 42px rgba(255,255,255,.38)}
    .env-panel.back{clip-path:polygon(0 0,100% 0,100% 100%,0 100%);}
    .env-panel.left{clip-path:polygon(0 0,50% 50%,0 100%);background:linear-gradient(145deg,#fff7eb,#ecdfd2)}
    .env-panel.right{clip-path:polygon(100% 0,50% 50%,100% 100%);background:linear-gradient(215deg,#fff7ec,#f0e1d4)}
    .env-panel.bottom{clip-path:polygon(0 100%,50% 50%,100% 100%);background:linear-gradient(0deg,#f1e2d2,#fff8ef)}
    .env-flap{position:absolute;inset:0;background:linear-gradient(180deg,#fff9ef 0%,#f8eadb 100%);clip-path:polygon(0 0,50% 58%,100% 0);border-top:1.25px solid var(--line);transform-origin:50% 0%;transition:transform 1s cubic-bezier(.2,.85,.19,1),filter 1s ease;z-index:6;box-shadow:0 1px 0 rgba(106,76,112,.24) inset;}
    .env-line{position:absolute;inset:0;z-index:7;pointer-events:none;}
    .env-line::before,.env-line::after{content:"";position:absolute;top:0;width:1.15px;height:64%;background:rgba(105,76,111,.45);transform-origin:top;}
    .env-line::before{left:0;transform:rotate(-39deg);}
    .env-line::after{right:0;transform:rotate(39deg);}
    .wax{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(18vw,86px);height:min(18vw,86px);border-radius:50%;background:radial-gradient(circle at 45% 38%,#a984ad 0 18%,#876096 48%,#6d4d78 100%);box-shadow:0 5px 12px rgba(56,34,64,.32),inset 0 0 0 5px rgba(255,255,255,.12),inset 0 0 0 10px rgba(57,36,64,.16);z-index:12;transition:opacity .4s ease, transform .6s ease;}
    .wax::before{content:"✤";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#eadfed;font-size:28px;line-height:1;opacity:.9}
    .open-label{position:absolute;left:0;right:0;bottom:6svh;text-align:center;letter-spacing:.42em;font-size:clamp(13px,3.1vw,18px);text-transform:uppercase;color:#82618d;z-index:12;font-family:Georgia,'Times New Roman',serif;transition:opacity .6s ease, transform .6s ease;}
    .ornament{display:block;margin:0 auto 21px;font-size:26px;letter-spacing:0;color:#876096;}

    .app.opening .wax{opacity:0;transform:translate(-50%,-50%) scale(.75)}
    .app.opening .env-flap{transform:rotateX(180deg);filter:brightness(1.03)}
    .app.opening .envelope{transform:scale(.92) translateY(-18px);opacity:0;transition-delay:.75s}
    .app.opening .open-label{opacity:0;transform:translateY(18px)}
    .app.opening .splash{opacity:0;pointer-events:none;transition-delay:1.25s}

    .menu-screen{opacity:0;z-index:10;pointer-events:none;display:block;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:30svh;}
    .app.open .menu-screen{opacity:1;pointer-events:auto;}

  <script>
    const app = document.getElementById('app');
    const splash = document.getElementById('splash');
    function openInvite(){
      if(app.classList.contains('opening') || app.classList.contains('open')) return;
      app.classList.add('opening');
      setTimeout(()=>{ app.classList.add('open'); }, 980);
      setTimeout(()=>{ splash.style.display='none'; }, 1900);
    }
    splash.addEventListener('click', openInvite);
    splash.addEventListener('keydown', (e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openInvite(); } });
  </script>
