<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Convite de Casamento</title>
  <style>
    @font-face{
      font-family: 'PlayfairLocal';
      src: url('assets/fonts/PlayfairDisplay-Regular.ttf') format('truetype');
      font-display: swap;
    }

    :root{
      --roxo:#7e5f87;
      --roxo-claro:#bba7c1;
      --borda:#b7a2bb;
      --papel:#fbf5ee;
      --papel-2:#f3e7dc;
      --fundo:#fbf7f2;
      --sombra:0 12px 35px rgba(83,62,83,.16);
      --menu-w: clamp(190px, 33vw, 320px);
      --menu-top: clamp(18px, 5vh, 46px);
      --menu-left: clamp(14px, 4vw, 48px);
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; min-height:100%; }
    body{
      font-family:'PlayfairLocal', Georgia, serif;
      background:var(--fundo);
      color:var(--roxo);
      overflow-x:hidden;
    }

    .screen{
      position:relative;
      min-height:100svh;
      width:100%;
      overflow:hidden;
      isolation:isolate;
      background:
        linear-gradient(90deg, rgba(255,255,255,.78), rgba(255,255,255,.38) 48%, rgba(238,219,235,.72) 100%),
        radial-gradient(circle at 8% 10%, rgba(255,255,255,.9), transparent 38%),
        linear-gradient(180deg,#fffdf9 0%,#fbf1f3 100%);
    }

    .leaf-layer{
      position:absolute;
      inset:0;
      z-index:0;
      pointer-events:none;
      opacity:.45;
    }
    .leaf{
      position:absolute;
      width:2px;
      height:34vh;
      border-radius:99px;
      background:rgba(126,95,135,.22);
      transform:rotate(165deg);
    }
    .leaf::before,
    .leaf::after{
      content:"";
      position:absolute;
      width:34px;
      height:14px;
      border-radius:50%;
      background:rgba(126,95,135,.18);
      left:-16px;
      transform:rotate(32deg);
      box-shadow:
        0 56px 0 rgba(126,95,135,.15),
        0 112px 0 rgba(126,95,135,.13),
        0 168px 0 rgba(126,95,135,.10);
    }
    .leaf::after{
      left:-4px;
      top:28px;
      transform:rotate(-28deg);
      opacity:.85;
    }
    .leaf.a{ right:6vw; top:4vh; }
    .leaf.b{ left:7vw; bottom:7vh; transform:rotate(150deg); height:27vh; opacity:.65; }
    .leaf.c{ right:3vw; bottom:4vh; transform:rotate(18deg); height:30vh; opacity:.5; }

    .church{
      position:absolute;
      z-index:1;
      left:8vw;
      bottom:5vh;
      width:min(62vw, 860px);
      max-height:82vh;
      object-fit:contain;
      opacity:.72;
      filter:saturate(.82) contrast(.92) brightness(1.06);
      transform:translateZ(0);
      user-select:none;
      pointer-events:none;
    }

    .menu{
      position:absolute;
      z-index:2;
      top:var(--menu-top);
      left:var(--menu-left);
      width:var(--menu-w);
      display:flex;
      flex-direction:column;
      gap:9px;
      opacity:0;
      transform:translateY(10px);
      pointer-events:none;
      transition: opacity .85s ease, transform .85s ease;
    }
    body.open .menu{
      opacity:1;
      transform:translateY(0);
      pointer-events:auto;
    }

    .menu a{
      min-height:39px;
      display:grid;
      grid-template-columns:38px 1px 1fr 18px;
      align-items:center;
      gap:10px;
      padding:7px 10px;
      text-decoration:none;
      color:var(--roxo);
      background:rgba(255,250,246,.86);
      border:1px solid var(--borda);
      border-radius:11px;
      box-shadow:0 4px 12px rgba(67,47,70,.08);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      letter-spacing:.10em;
      text-transform:uppercase;
      font-size:clamp(12px, 1.35vw, 17px);
      line-height:1;
    }
    .menu a .ico{ display:flex; justify-content:center; align-items:center; }
    .menu svg{ width:22px; height:22px; stroke:currentColor; stroke-width:1.7; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    .divider{ height:24px; width:1px; background:rgba(126,95,135,.34); }
    .arrow{ font-size:22px; line-height:1; text-align:right; opacity:.9; }

    .intro{
      position:fixed;
      inset:0;
      z-index:20;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        linear-gradient(180deg, rgba(255,255,255,.65), rgba(251,241,243,.92)),
        radial-gradient(circle at 20% 90%, rgba(126,95,135,.08), transparent 38%);
      overflow:hidden;
      transition: opacity .8s ease, visibility .8s ease;
    }
    .intro.hide{ opacity:0; visibility:hidden; pointer-events:none; }
    .intro .leaf-layer{ z-index:0; }

    .tap-area{
      position:relative;
      z-index:1;
      width:min(94vw, 620px);
      height:min(88svh, 780px);
      border:0;
      background:transparent;
      color:var(--roxo);
      cursor:pointer;
      font:inherit;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:clamp(24px, 5vh, 52px);
      -webkit-tap-highlight-color:transparent;
    }

    .envelope-wrap{
      position:relative;
      width:min(88vw, 560px);
      aspect-ratio:1.56/1;
      filter:drop-shadow(0 18px 24px rgba(80,65,75,.18));
      transition: transform .9s ease, opacity .7s ease;
    }
    .tap-area.opening .envelope-wrap{ transform:scale(.92) translateY(-18px); opacity:.0; }

    .envelope{
      position:absolute;
      inset:0;
      border:1.2px solid rgba(126,95,135,.42);
      background:linear-gradient(180deg, #fff7ed, #f7eadb);
      overflow:hidden;
    }
    .envelope::before,
    .envelope::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
    }
    .envelope::before{
      background:
        linear-gradient(32deg, transparent 49.7%, rgba(126,95,135,.45) 50%, transparent 50.3%),
        linear-gradient(148deg, transparent 49.7%, rgba(126,95,135,.45) 50%, transparent 50.3%);
    }
    .envelope::after{
      background:
        linear-gradient(26deg, rgba(241,225,206,.55) 0 49.5%, transparent 50%),
        linear-gradient(154deg, rgba(255,248,239,.78) 0 49.5%, transparent 50%);
      opacity:.88;
    }
    .flap{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, #fff9ef, #f6eadc);
      clip-path:polygon(0 0, 100% 0, 50% 58%);
      border-top:1px solid rgba(126,95,135,.35);
      transform-origin:50% 0;
      transition:transform .75s cubic-bezier(.2,.8,.2,1);
      z-index:3;
    }
    .tap-area.opening .flap{ transform:rotateX(78deg); }
    .seal{
      position:absolute;
      z-index:4;
      left:50%; top:50%;
      width:clamp(70px, 14vw, 104px);
      aspect-ratio:1;
      transform:translate(-50%, -50%);
      border-radius:50%;
      background:radial-gradient(circle at 38% 32%, #a97fc0, #7c5391 70%);
      box-shadow: inset 0 0 0 5px rgba(255,255,255,.12), inset 0 0 0 12px rgba(89,54,105,.18), 0 7px 18px rgba(70,50,70,.28);
      display:grid;
      place-items:center;
      color:#f1deee;
      font-size:clamp(28px, 5vw, 42px);
      transition: opacity .45s ease, transform .45s ease;
    }
    .tap-area.opening .seal{ opacity:0; transform:translate(-50%,-50%) scale(.8); }
    .prompt{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:16px;
      letter-spacing:.34em;
      text-transform:uppercase;
      font-size:clamp(13px, 2vw, 18px);
      transition:opacity .5s ease;
    }
    .prompt .orn{ font-size:30px; letter-spacing:0; line-height:1; }
    .tap-area.opening .prompt{ opacity:0; }

    @media (orientation:portrait){
      .screen{ min-height:100svh; }
      .church{
        width:118vw;
        left:8vw;
        bottom:3vh;
        opacity:.62;
        transform:translateX(-12%);
      }
      .menu{
        --menu-w: min(54vw, 235px);
        --menu-top: max(18px, 4.5vh);
        --menu-left: 16px;
        gap:8px;
      }
      .menu a{
        min-height:36px;
        grid-template-columns:30px 1px 1fr 14px;
        gap:8px;
        padding:6px 9px;
        border-radius:10px;
        font-size:clamp(10.5px, 3.1vw, 13px);
        letter-spacing:.09em;
      }
      .menu svg{ width:19px; height:19px; }
      .divider{ height:21px; }
      .arrow{ font-size:19px; }
      .tap-area{ justify-content:center; height:100svh; }
      .envelope-wrap{ width:96vw; transform:scale(1.05); }
    }

    @media (orientation:landscape){
      .screen{ height:100svh; min-height:480px; }
      .church{
        width:64vw;
        left:22vw;
        bottom:3vh;
        opacity:.68;
      }
      .menu{
        --menu-w: min(28vw, 310px);
        --menu-top: 22px;
        --menu-left: 24px;
        gap:7px;
      }
      .menu a{
        min-height:34px;
        grid-template-columns:32px 1px 1fr 14px;
        padding:5px 9px;
        font-size:clamp(10px, 1.35vw, 14px);
        border-radius:9px;
      }
      .menu svg{ width:18px; height:18px; }
      .tap-area{ width:100vw; height:100svh; }
      .envelope-wrap{ width:min(76vw, 760px); }
    }

    @media (max-height:640px) and (orientation:portrait){
      body{ overflow-y:auto; }
      .screen{ min-height:760px; }
      .intro{ min-height:100svh; }
      .menu{ position:absolute; }
    }
  </style>
</head>
<body>
  <main class="screen" aria-label="Menu do convite de casamento">
    <div class="leaf-layer" aria-hidden="true"><span class="leaf a"></span><span class="leaf b"></span><span class="leaf c"></span></div>
    <img class="church" src="assets/img/igreja-bg.jpg" alt="Igreja em aquarela" />

    <nav class="menu" aria-label="Navegação principal">
      <a href="convite.html"><span class="ico"><svg viewBox="0 0 24 24"><path d="M3 6h18v12H3z"/><path d="m3 7 9 7 9-7"/></svg></span><span class="divider"></span><span>Convite</span><span class="arrow">›</span></a>
      <a href="cerimonia.html"><span class="ico"><svg viewBox="0 0 24 24"><path d="M4 21V10l8-6 8 6v11"/><path d="M9 21v-7h6v7"/><path d="M12 4V2"/><path d="M10.5 3h3"/></svg></span><span class="divider"></span><span>Cerimônia</span><span class="arrow">›</span></a>
      <a href="festa.html"><span class="ico"><svg viewBox="0 0 24 24"><path d="M8 3v7a4 4 0 1 1-4 0V3"/><path d="M4 3h4"/><path d="M6 14v7"/><path d="M16 3v7a4 4 0 1 0 4 0V3"/><path d="M16 3h4"/><path d="M18 14v7"/></svg></span><span class="divider"></span><span>Festa</span><span class="arrow">›</span></a>
      <a href="presentes.html"><span class="ico"><svg viewBox="0 0 24 24"><path d="M3 9h18v12H3z"/><path d="M12 9v12"/><path d="M3 9V6h18v3"/><path d="M12 6c-2-4-6-2.5-5 0 1 2 5 0 5 0Z"/><path d="M12 6c2-4 6-2.5 5 0-1 2-5 0-5 0Z"/></svg></span><span class="divider"></span><span>Presentes</span><span class="arrow">›</span></a>
      <a href="hospedagem.html"><span class="ico"><svg viewBox="0 0 24 24"><path d="M4 20V5"/><path d="M4 14h16v6"/><path d="M8 14V9h4a3 3 0 0 1 3 3v2"/><path d="M4 20h16"/></svg></span><span class="divider"></span><span>Hospedagem</span><span class="arrow">›</span></a>
      <a href="transporte.html"><span class="ico"><svg viewBox="0 0 24 24"><path d="M6 17h12"/><path d="M5 17l1-7h12l1 7"/><path d="M8 10l1-3h6l1 3"/><circle cx="8" cy="18" r="1.5"/><circle cx="16" cy="18" r="1.5"/></svg></span><span class="divider"></span><span>Transporte</span><span class="arrow">›</span></a>
      <a href="presenca.html"><span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="m8 12 2.5 2.5L16 9"/></svg></span><span class="divider"></span><span>Presença</span><span class="arrow">›</span></a>
      <a href="recados.html"><span class="ico"><svg viewBox="0 0 24 24"><path d="M20.8 4.6a5.4 5.4 0 0 0-7.6 0L12 5.8l-1.2-1.2a5.4 5.4 0 1 0-7.6 7.6L12 21l8.8-8.8a5.4 5.4 0 0 0 0-7.6Z"/></svg></span><span class="divider"></span><span>Recados</span><span class="arrow">›</span></a>
    </nav>
  </main>

  <section class="intro" id="intro" aria-label="Abertura do convite">
    <div class="leaf-layer" aria-hidden="true"><span class="leaf a"></span><span class="leaf b"></span><span class="leaf c"></span></div>
    <button class="tap-area" id="openBtn" type="button" aria-label="Toque para abrir o convite">
      <span class="envelope-wrap" aria-hidden="true">
        <span class="envelope"><span class="flap"></span><span class="seal">✤</span></span>
      </span>
      <span class="prompt"><span class="orn">✤</span><span>Toque para abrir</span></span>
    </button>
  </section>

  <script>
    const intro = document.getElementById('intro');
    const openBtn = document.getElementById('openBtn');

    function openInvite(){
      if(openBtn.classList.contains('opening')) return;
      openBtn.classList.add('opening');
      setTimeout(() => {
        intro.classList.add('hide');
        document.body.classList.add('open');
      }, 720);
    }
    openBtn.addEventListener('click', openInvite);
    openBtn.addEventListener('touchend', function(e){ e.preventDefault(); openInvite(); }, {passive:false});
  </script>
</body>
</html>
