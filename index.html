<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f0ea" />
  <title>Convite de Casamento</title>
  <style>
    :root{
      --paper:#faf5ef;
      --paper-2:#f3e9e2;
      --cream:#fff9f1;
      --cream-2:#f5e8d9;
      --purple:#7b5a83;
      --purple-2:#9a80a0;
      --line:rgba(100,73,108,.56);
      --shadow:0 18px 34px rgba(72,54,78,.14);
      --soft-shadow:0 10px 20px rgba(72,54,78,.10);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;min-height:100%;background:var(--paper);color:var(--purple);font-family:Georgia,'Times New Roman',serif;overflow:hidden}
    body{height:100svh}
    a{color:inherit;text-decoration:none}

    .app{position:relative;width:100vw;height:100svh;overflow:hidden;background:
      radial-gradient(circle at 7% 11%,rgba(255,255,255,.96),transparent 36%),
      radial-gradient(circle at 92% 73%,rgba(221,205,225,.44),transparent 45%),
      linear-gradient(155deg,#fbf8f4 0%,#f4ece5 68%,#efe1ed 100%);
    }
    .texture{position:absolute;inset:0;opacity:.30;background-image:linear-gradient(90deg,rgba(255,255,255,.18) 1px,transparent 1px),linear-gradient(rgba(114,88,104,.035) 1px,transparent 1px);background-size:7px 7px;pointer-events:none;mix-blend-mode:multiply;z-index:1}

    .leaf{position:absolute;width:118px;height:270px;opacity:.32;pointer-events:none;z-index:5}
    .leaf::before{content:"";position:absolute;left:57px;top:0;width:1.4px;height:100%;background:rgba(121,90,131,.36);transform:rotate(12deg);transform-origin:bottom}
    .leaf span{position:absolute;width:38px;height:15px;border-radius:50%;background:rgba(139,105,147,.34);transform:rotate(var(--r));left:var(--x);top:var(--y)}
    .leaf-left{left:-24px;bottom:6%;transform:rotate(-25deg) scale(1.05)}
    .leaf-right{right:-2px;top:5%;transform:rotate(18deg) scale(1.22)}
    .leaf-menu{right:-15px;top:8%;height:80%;opacity:.34;transform:rotate(10deg) scale(1.18);z-index:4}

    .screen{position:absolute;inset:0;transition:opacity 1s ease,transform 1s ease}

    /* TELA 1: ENVELOPE */
    .splash{z-index:20;display:grid;place-items:center;cursor:pointer;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
    .splash-content{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5svh 0 9svh}
    .envelope{position:relative;width:112vw;max-width:560px;height:min(63svh,720px);min-height:500px;filter:drop-shadow(0 22px 22px rgba(71,52,76,.13));transform-origin:center center;transition:transform 1.12s cubic-bezier(.22,.75,.16,1),opacity .72s ease;z-index:8}
    .env-back,.env-left,.env-right,.env-bottom,.env-flap{position:absolute;inset:0;border:1px solid var(--line)}
    .env-back{background:linear-gradient(150deg,#fffaf1,#f4e7d8)}
    .env-left{clip-path:polygon(0 0,50% 52%,0 100%);background:linear-gradient(135deg,#fff8ee,#efe1d3);border-right:0}
    .env-right{clip-path:polygon(100% 0,50% 52%,100% 100%);background:linear-gradient(220deg,#fff8ee,#efe1d3);border-left:0}
    .env-bottom{clip-path:polygon(0 100%,50% 52%,100% 100%);background:linear-gradient(0deg,#f0e0d0,#fff8ef);border-top:0}
    .env-flap{clip-path:polygon(0 0,50% 52%,100% 0);background:linear-gradient(180deg,#fffaf2,#f8eadc);transform-origin:50% 0;z-index:9;box-shadow:inset 0 1px 0 rgba(255,255,255,.65);transition:transform 1.1s cubic-bezier(.22,.85,.16,1)}
    .env-lines{position:absolute;inset:0;z-index:10;pointer-events:none}
    .env-lines::before,.env-lines::after{content:"";position:absolute;top:0;width:1px;height:60%;background:rgba(100,73,108,.50);transform-origin:top}
    .env-lines::before{left:0;transform:rotate(-39deg)}
    .env-lines::after{right:0;transform:rotate(39deg)}
    .wax{position:absolute;left:50%;top:52%;width:88px;height:88px;transform:translate(-50%,-50%);border-radius:50%;z-index:14;background:radial-gradient(circle at 42% 34%,#b08abb 0 16%,#91679d 47%,#6f4f7b 100%);box-shadow:0 9px 14px rgba(64,42,69,.28),inset 0 0 0 5px rgba(255,255,255,.14),inset 0 0 0 11px rgba(58,36,65,.15);transition:opacity .45s ease,transform .58s ease}
    .wax::before{content:"✤";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px;color:#eadfed;opacity:.9}
    .open-label{position:absolute;left:0;right:0;bottom:8svh;text-align:center;text-transform:uppercase;letter-spacing:.45em;color:#82618d;font-size:clamp(13px,3.2vw,18px);z-index:12;transition:opacity .65s ease,transform .65s ease}.open-label .orn{display:block;font-size:26px;letter-spacing:0;margin:0 0 20px}

    .app.opening .wax{opacity:0;transform:translate(-50%,-50%) scale(.74)}
    .app.opening .env-flap{transform:rotateX(180deg)}
    .app.opening .envelope{transform:scale(.91) translateY(-16px);opacity:0;transition-delay:.72s}
    .app.opening .open-label{opacity:0;transform:translateY(18px)}
    .app.opening .splash{opacity:0;pointer-events:none;transition-delay:1.25s}

    /* TELA 2: MENU */
    .menu-screen{z-index:10;opacity:0;pointer-events:none;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:8svh 0 9svh;scrollbar-width:none}.menu-screen::-webkit-scrollbar{display:none}
    .app.open .menu-screen{opacity:1;pointer-events:auto}
    .church-bg{position:fixed;left:-28vw;bottom:-2svh;width:115vw;height:88svh;background:url('assets/img/igreja-aquarela-soft.png') left bottom/contain no-repeat;opacity:.68;filter:saturate(.92) contrast(.94);z-index:2;transform:translateX(-14px);transition:opacity 1s ease,transform 1s ease;pointer-events:none}
    .menu-gradient{position:fixed;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.04) 0%,rgba(250,245,239,.28) 35%,rgba(247,238,245,.72) 100%);z-index:3;pointer-events:none}
    .menu-list{position:relative;z-index:8;width:min(78vw,430px);margin-left:auto;margin-right:4vw;display:flex;flex-direction:column;gap:12px;padding-top:8svh;padding-bottom:6svh;transform:translateX(0)}
    .menu-card{height:66px;border:1.4px solid rgba(116,84,124,.64);border-radius:17px;background:rgba(255,250,243,.86);box-shadow:var(--soft-shadow);display:grid;grid-template-columns:54px 1px 1fr 32px;align-items:center;overflow:hidden;backdrop-filter:blur(2px);opacity:0;transform:translateX(18px);animation:showItem .55s ease forwards;animation-delay:calc(.12s * var(--i) + .28s)}
    .icon{display:grid;place-items:center;color:var(--purple);height:100%}.icon svg{width:29px;height:29px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}.sep{height:38px;background:rgba(127,103,132,.28)}.txt{text-transform:uppercase;letter-spacing:.14em;font-size:clamp(18px,5.6vw,25px);font-weight:600;line-height:1;color:var(--purple);padding-left:24px}.arr{font-size:40px;line-height:1;color:var(--purple-2);padding-bottom:5px;text-align:center}@keyframes showItem{to{opacity:1;transform:translateX(0)}}

    @media (max-height:740px) and (orientation:portrait){.menu-screen{padding-top:2svh}.menu-list{padding-top:4svh;gap:9px}.menu-card{height:59px;border-radius:15px}.txt{font-size:clamp(17px,5vw,22px)}}
    @media (orientation:portrait){.app.open .splash{display:none}.menu-screen{min-height:100svh}.church-bg{left:-35vw;width:130vw;height:80svh;bottom:-4svh}.menu-list{margin-right:4vw}.leaf-menu{right:-32px}}
    @media (orientation:landscape){body{height:100svh}.envelope{width:72vw;max-width:none;height:68svh;min-height:0}.open-label{bottom:8svh;font-size:14px}.leaf-left{left:3vw;bottom:8%;transform:rotate(-18deg) scale(.95)}.leaf-right{right:3vw;top:10%;transform:rotate(20deg) scale(.95)}.menu-screen{overflow-y:auto;padding:5svh 0}.church-bg{left:0;bottom:-6svh;width:58vw;height:105svh;background-size:contain;background-position:left center;opacity:.64}.menu-gradient{background:linear-gradient(90deg,rgba(255,255,255,.02) 0%,rgba(250,245,239,.20) 48%,rgba(246,236,244,.76) 100%)}.menu-list{width:min(40vw,430px);margin-right:5vw;padding-top:0;gap:9px}.menu-card{height:43px;border-radius:10px;grid-template-columns:44px 1px 1fr 26px}.icon svg{width:22px;height:22px}.sep{height:26px}.txt{font-size:clamp(13px,1.9vw,18px);letter-spacing:.13em;padding-left:17px}.arr{font-size:28px}.leaf-menu{right:2vw;top:6%;height:80%;opacity:.30}}
  </style>
</head>
<body>
  <main class="app" id="app">
    <div class="texture"></div>

    <section class="screen splash" id="splash" role="button" tabindex="0" aria-label="Abrir convite">
      <div class="leaf leaf-left"><span style="--x:8px;--y:20px;--r:35deg"></span><span style="--x:44px;--y:55px;--r:-22deg"></span><span style="--x:11px;--y:92px;--r:32deg"></span><span style="--x:49px;--y:130px;--r:-20deg"></span><span style="--x:17px;--y:170px;--r:28deg"></span><span style="--x:49px;--y:210px;--r:-18deg"></span></div>
      <div class="leaf leaf-right"><span style="--x:8px;--y:20px;--r:35deg"></span><span style="--x:44px;--y:55px;--r:-22deg"></span><span style="--x:11px;--y:92px;--r:32deg"></span><span style="--x:49px;--y:130px;--r:-20deg"></span><span style="--x:17px;--y:170px;--r:28deg"></span><span style="--x:49px;--y:210px;--r:-18deg"></span></div>
      <div class="splash-content">
        <div class="envelope" aria-hidden="true"><div class="env-back"></div><div class="env-left"></div><div class="env-right"></div><div class="env-bottom"></div><div class="env-flap"></div><div class="env-lines"></div><div class="wax"></div></div>
        <div class="open-label"><span class="orn">✤</span>Toque para abrir</div>
      </div>
    </section>

    <section class="screen menu-screen" aria-label="Menu do convite">
      <div class="church-bg" aria-hidden="true"></div>
      <div class="menu-gradient" aria-hidden="true"></div>
      <div class="leaf leaf-menu"><span style="--x:8px;--y:20px;--r:35deg"></span><span style="--x:44px;--y:55px;--r:-22deg"></span><span style="--x:11px;--y:92px;--r:32deg"></span><span style="--x:49px;--y:130px;--r:-20deg"></span><span style="--x:17px;--y:170px;--r:28deg"></span><span style="--x:49px;--y:210px;--r:-18deg"></span><span style="--x:21px;--y:252px;--r:24deg"></span><span style="--x:50px;--y:296px;--r:-20deg"></span></div>
      <nav class="menu-list" aria-label="Navegação principal">
        <a class="menu-card" style="--i:0" href="convite.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M3 6h18v12H3z"/><path d="m3 7 9 7 9-7"/></svg></span><span class="sep"></span><span class="txt">Convite</span><span class="arr">›</span></a>
        <a class="menu-card" style="--i:1" href="cerimonia.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M12 3v5"/><path d="M10 5h4"/><path d="M5 21V10l7-5 7 5v11"/><path d="M9 21v-7h6v7"/></svg></span><span class="sep"></span><span class="txt">Cerimônia</span><span class="arr">›</span></a>
        <a class="menu-card" style="--i:2" href="festa.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M8 3h4l-1 8a3 3 0 1 1-2 0z"/><path d="M16 3h4l-1 8a3 3 0 1 1-2 0z"/><path d="M10 14v7"/><path d="M18 14v7"/></svg></span><span class="sep"></span><span class="txt">Festa</span><span class="arr">›</span></a>
        <a class="menu-card" style="--i:3" href="presentes.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M4 10h16v11H4z"/><path d="M3 7h18v3H3z"/><path d="M12 7v14"/><path d="M12 7c-3 0-5-1-5-3 0-1 1-2 2-2 2 0 3 3 3 5z"/><path d="M12 7c3 0 5-1 5-3 0-1-1-2-2-2-2 0-3 3-3 5z"/></svg></span><span class="sep"></span><span class="txt">Presentes</span><span class="arr">›</span></a>
        <a class="menu-card" style="--i:4" href="hospedagem.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M4 11V5"/><path d="M4 15h16"/><path d="M20 15v-4a3 3 0 0 0-3-3h-5v7"/><path d="M4 15v4"/><path d="M20 15v4"/><path d="M4 11h8"/></svg></span><span class="sep"></span><span class="txt">Hospedagem</span><span class="arr">›</span></a>
        <a class="menu-card" style="--i:5" href="transporte.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M5 17h14l-1-6H6z"/><path d="M7 17a2 2 0 1 0 0 4 2 2 0 0 0 0-4"/><path d="M17 17a2 2 0 1 0 0 4 2 2 0 0 0 0-4"/><path d="M7 11l2-4h6l2 4"/></svg></span><span class="sep"></span><span class="txt">Transporte</span><span class="arr">›</span></a>
        <a class="menu-card" style="--i:6" href="presenca.html"><span class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="m8 12 3 3 5-6"/></svg></span><span class="sep"></span><span class="txt">Presença</span><span class="arr">›</span></a>
        <a class="menu-card" style="--i:7" href="recados.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg></span><span class="sep"></span><span class="txt">Recados</span><span class="arr">›</span></a>
      </nav>
    </section>
  </main>
  <script>
    const app=document.getElementById('app');
    const splash=document.getElementById('splash');
    function openInvite(){
      if(app.classList.contains('opening')||app.classList.contains('open')) return;
      app.classList.add('opening');
      setTimeout(()=>app.classList.add('open'),980);
      setTimeout(()=>{splash.style.display='none'},1900);
    }
    splash.addEventListener('click',openInvite);
    splash.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openInvite();}});
  </script>
</body>
</html>
