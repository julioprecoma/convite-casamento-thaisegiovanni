<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Convite | Thaís & Giovanni</title>
  <meta name="description" content="Convite de casamento" />
  <link rel="preload" href="assets/img/church-bg.jpg" as="image" />
  <link rel="preload" href="assets/fonts/PlayfairDisplay.ttf" as="font" type="font/ttf" crossorigin />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <main class="home-shell" aria-label="Abertura do convite">
    <section class="intro" id="intro">
      <div class="intro-bg" aria-hidden="true"></div>

      <button class="open-invitation" id="openInvitation" type="button" aria-label="Abrir convite">
        <span class="tap-label">Toque para abrir</span>

        <span class="envelope-stage" aria-hidden="true">
          <svg class="envelope-svg" viewBox="0 0 360 260" role="img">
            <defs>
              <linearGradient id="paperFill" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#f3eee7" />
                <stop offset="0.45" stop-color="#ded2c4" />
                <stop offset="1" stop-color="#b7ab99" />
              </linearGradient>
              <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
                <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1e1721" flood-opacity="0.22" />
              </filter>
            </defs>

            <g class="envelope-body" filter="url(#softShadow)">
              <rect class="env-base" x="50" y="86" width="260" height="142" rx="3" />
              <path class="env-left" d="M50 90 L180 168 L50 228 Z" />
              <path class="env-right" d="M310 90 L180 168 L310 228 Z" />
              <path class="env-bottom" d="M50 228 L180 150 L310 228 Z" />
              <path class="env-flap" d="M50 88 L180 18 L310 88 L180 168 Z" />
            </g>

            <g class="envelope-lines">
              <path class="line line-1" d="M50 88 L180 18 L310 88" />
              <path class="line line-2" d="M50 88 L180 168 L310 88" />
              <path class="line line-3" d="M50 228 L180 150 L310 228" />
              <path class="line line-4" d="M50 88 L50 228 L310 228 L310 88" />
            </g>

            <image class="emerging-card" href="assets/img/envelope-lines.jpg" x="93" y="34" width="174" height="98" preserveAspectRatio="xMidYMid slice" />
          </svg>
        </span>
      </button>
    </section>

    <section class="menu-screen" id="menuScreen" aria-label="Menu do convite" aria-hidden="true">
      <div class="church-bg" aria-hidden="true"></div>
      <nav class="main-menu" aria-label="Navegação principal">
        <a href="convite.html">Convite</a>
        <a href="cerimonia.html">Cerimônia</a>
        <a href="festa.html">Festa</a>
        <a href="presentes.html">Presentes</a>
        <a href="hospedagem.html">Hospedagem</a>
        <a href="transporte.html">Transporte</a>
        <a href="presenca.html">Presença</a>
        <a href="recados.html">Recados</a>
      </nav>
    </section>
  </main>

  <script src="assets/js/envelope.js"></script>
</body>
</html>
