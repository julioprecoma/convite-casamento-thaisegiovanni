<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Convite de Casamento</title>
  <style>
    :root{
      --bg:#f7f0eb;
      --cream:#fff8ee;
      --cream-2:#f3e6d8;
      --purple:#7b5a83;
      --purple-soft:#b99fbc;
      --line:rgba(105,76,111,.55);
      --shadow:0 22px 45px rgba(73,52,76,.15);
      --radius:15px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:Georgia,'Times New Roman',serif;color:var(--purple)}
    body{min-height:100svh}
    a{color:inherit;text-decoration:none}
    .app{position:relative;width:100vw;height:100svh;overflow:hidden;background:
      radial-gradient(circle at 13% 10%,rgba(255,255,255,.95),transparent 35%),
      radial-gradient(circle at 86% 72%,rgba(215,195,218,.35),transparent 40%),
      linear-gradient(155deg,#fbf8f4 0%,#f2e8e3 70%,#eee0ec 100%);
    }
    .paper-texture{position:absolute;inset:0;opacity:.35;background-image:linear-gradient(90deg,rgba(255,255,255,.16) 1px,transparent 1px),linear-gradient(rgba(115,93,105,.04) 1px,transparent 1px);background-size:7px 7px;pointer-events:none;mix-blend-mode:multiply}
    .leaf{position:absolute;width:110px;height:240px;opacity:.28;pointer-events:none;z-index:3}
    .leaf::before{content:"";position:absolute;left:51px;top:0;width:1.5px;height:100%;background:rgba(122,90,131,.35);transform:rotate(12deg);transform-origin:bottom}
    .leaf span{position:absolute;width:34px;height:14px;border-radius:50%;background:rgba(139,105,147,.35);transform:rotate(var(--r));left:var(--x);top:var(--y)}
    .leaf-left{left:-12px;bottom:12%;transform:rotate(-28deg) scale(1.05)}
    .leaf-right{right:-5px;top:7%;transform:rotate(18deg) scale(1.18)}
    .leaf-menu{right:-18px;top:18%;height:70%;opacity:.42;transform:rotate(10deg) scale(1.15)}

    .screen{position:absolute;inset:0;transition:opacity .9s ease, transform .9s ease;}
    .splash{display:flex;align-items:center;justify-content:center;z-index:20;padding:7svh 6vw 5svh;cursor:pointer;}
    .splash-inner{position:relative;width:min(90vw,470px);height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5svh;}
    .envelope-stage{position:relative;width:min(103vw,520px);height:min(68svh,760px);display:flex;align-items:center;justify-content:center;}
    .envelope{position:relative;width:100%;height:78%;min-height:430px;filter:drop-shadow(0 25px 26px rgba(69,48,72,.16));transform-origin:center;transition:transform 1s cubic-bezier(.22,.75,.16,1),opacity .7s ease;}
    .env-panel{position:absolute;inset:0;background:linear-gradient(160deg,#fffaf0,#f3e5d5);border:1.25px solid var(--line);box-shadow:inset 0 0 42px rgba(255,255,255,.38)}
    .env-panel.back{clip-path:polygon(0 0,100% 0,100% 100%,0 100%);}
    .env-panel.left{clip-path:polygon(0 0,50% 50%,0 100%);background:linear-gradient(145deg,#fff7eb,#ecdfd2)}
    .env-panel.right{clip-path:polygon(100% 0,50% 50%,100% 100%);background:linear-gradient(215deg,#fff7ec,#f0e1d4)}
    .env-panel.bottom{clip-path:polygon(0 100%,50% 50%,100% 100%);background:linear-gradient(0deg,#f1e2d2,#fff8ef)}
    .env-flap{position:absolute;inset:0;background:linear-gradient(180deg,#fff9ef 0%,#f8eadb 100%);clip-path:polygon(0 0,50% 58%,100% 0);border-top:1.25px solid var(--line);transform-origin:50% 0%;transition:transform 1s cubic-bezier(.2,.85,.19,1),filter 1s ease;z-index:6;box-shadow:0 1px 0 rgba(106,76,112,.24) inset;}
    .env-line{position:absolute;inset:0;z-index:7;pointer-events:none;}
    .env-line::before,.env-line::after{content:"";position:absolute;top:0;width:1.15px;height:64%;background:rgba(105,76,111,.45);transform-origin:top;}
    .env-line::before{left:0;transform:rotate(-39deg);}
    .env-line::after{right:0;transform:rotate(39deg);}
    .wax{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(18vw,86px);height:min(18vw,86px);border-radius:50%;background:radial-gradient(circle at 45% 38%,#a984ad 0 18%,#876096 48%,#6d4d78 100%);box-shadow:0 5px 12px rgba(56,34,64,.32),inset 0 0 0 5px rgba(255,255,255,.12),inset 0 0 0 10px rgba(57,36,64,.16);z-index:12;transition:opacity .4s ease, transform .6s ease;}
    .wax::before{content:"✤";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#eadfed;font-size:28px;line-height:1;opacity:.9}
    .open-label{position:absolute;left:0;right:0;bottom:6svh;text-align:center;letter-spacing:.42em;font-size:clamp(13px,3.1vw,18px);text-transform:uppercase;color:#82618d;z-index:12;font-family:Georgia,'Times New Roman',serif;transition:opacity .6s ease, transform .6s ease;}
    .ornament{display:block;margin:0 auto 21px;font-size:26px;letter-spacing:0;color:#876096;}

    .app.opening .wax{opacity:0;transform:translate(-50%,-50%) scale(.75)}
    .app.opening .env-flap{transform:rotateX(180deg);filter:brightness(1.03)}
    .app.opening .envelope{transform:scale(.92) translateY(-18px);opacity:0;transition-delay:.75s}
    .app.opening .open-label{opacity:0;transform:translateY(18px)}
    .app.opening .splash{opacity:0;pointer-events:none;transition-delay:1.25s}

    .menu-screen{opacity:0;z-index:10;pointer-events:none;display:block;}
    .app.open .menu-screen{opacity:1;pointer-events:auto;}
    .church-wrap{position:absolute;left:-10vw;bottom:-2svh;width:78vw;max-width:650px;height:86svh;opacity:0;transform:translateX(-26px) scale(.98);transition:opacity 1.15s ease .15s,transform 1.15s ease .15s;}
    .app.open .church-wrap{opacity:1;transform:translateX(0) scale(1)}
    .church{position:absolute;left:0;bottom:0;width:100%;height:100%;object-fit:contain;object-position:left bottom;filter:saturate(.8) contrast(.97) brightness(1.02);}
    .menu-list{position:absolute;right:clamp(16px,5vw,38px);top:50%;width:min(48vw,340px);transform:translateY(-44%);display:grid;gap:clamp(10px,1.65svh,15px);z-index:15;}
    .menu-card{height:clamp(54px,7.5svh,76px);border:1.4px solid rgba(105,76,111,.55);border-radius:14px;background:rgba(255,250,245,.86);box-shadow:0 6px 14px rgba(80,57,84,.08);backdrop-filter:blur(2px);display:grid;grid-template-columns:54px 1px 1fr 22px;align-items:center;padding:0 15px 0 10px;color:#7b5a83;opacity:0;transform:translateX(18px);animation:cardIn .72s ease forwards;animation-delay:calc(1.25s + var(--i)*.08s);}
    .menu-card .icon{display:flex;align-items:center;justify-content:center;width:42px;height:42px;color:#7b5a83}.menu-card svg{width:28px;height:28px;stroke:currentColor;stroke-width:1.55;fill:none;stroke-linecap:round;stroke-linejoin:round}.menu-card .sep{height:58%;background:rgba(105,76,111,.35)}.menu-card .txt{padding-left:20px;font-size:clamp(17px,3.7vw,25px);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}.menu-card .arr{font-size:33px;line-height:1;transform:translateY(-1px);opacity:.85}
    @keyframes cardIn{to{opacity:1;transform:translateX(0)}}

    @media (orientation:landscape){
      .splash{padding:3svh 6vw}.splash-inner{width:100%;max-width:none}.envelope-stage{width:min(92vw,1060px);height:70svh}.envelope{height:100%;min-height:0}.open-label{bottom:8svh;font-size:clamp(11px,1.8vw,16px)}.wax{width:min(11vw,92px);height:min(11vw,92px)}.church-wrap{left:3vw;bottom:-7svh;width:43vw;height:92svh}.menu-list{width:min(37vw,410px);right:7vw;transform:translateY(-50%);gap:10px}.menu-card{height:clamp(42px,9svh,60px)}.menu-card .txt{font-size:clamp(15px,2vw,22px)}.leaf-left,.leaf-right{opacity:.26}
    }
    @media (max-height:720px) and (orientation:portrait){.menu-list{gap:8px;transform:translateY(-42%)}.menu-card{height:50px}.menu-card .txt{font-size:17px}.menu-card svg{width:24px;height:24px}.church-wrap{width:76vw}}
    @media (max-width:360px){.menu-list{width:53vw;right:12px}.menu-card{grid-template-columns:43px 1px 1fr 14px;padding-right:8px}.menu-card .txt{padding-left:12px;font-size:15px}.church-wrap{width:82vw;left:-18vw}}
  </style>
</head>
<body>
  <main class="app" id="app" aria-label="Convite de casamento">
    <div class="paper-texture"></div>
    <div class="leaf leaf-left"><span style="--x:6px;--y:14px;--r:35deg"></span><span style="--x:44px;--y:44px;--r:-22deg"></span><span style="--x:12px;--y:76px;--r:32deg"></span><span style="--x:47px;--y:105px;--r:-18deg"></span><span style="--x:16px;--y:139px;--r:27deg"></span><span style="--x:49px;--y:172px;--r:-22deg"></span></div>
    <div class="leaf leaf-right"><span style="--x:6px;--y:14px;--r:35deg"></span><span style="--x:44px;--y:44px;--r:-22deg"></span><span style="--x:12px;--y:76px;--r:32deg"></span><span style="--x:47px;--y:105px;--r:-18deg"></span><span style="--x:16px;--y:139px;--r:27deg"></span><span style="--x:49px;--y:172px;--r:-22deg"></span></div>

    <section class="screen splash" id="splash" role="button" tabindex="0" aria-label="Toque para abrir o convite">
      <div class="splash-inner">
        <div class="envelope-stage">
          <div class="envelope" aria-hidden="true">
            <div class="env-panel back"></div>
            <div class="env-panel left"></div>
            <div class="env-panel right"></div>
            <div class="env-panel bottom"></div>
            <div class="env-flap"></div>
            <div class="env-line"></div>
            <div class="wax"></div>
          </div>
        </div>
        <div class="open-label"><span class="ornament">✤</span>Toque para abrir</div>
      </div>
    </section>

    <section class="screen menu-screen" aria-label="Menu do convite">
      <div class="church-wrap"><img class="church" src="assets/img/igreja-aquarela.jpg" alt="Igreja em aquarela"></div>
      <div class="leaf leaf-menu"><span style="--x:6px;--y:14px;--r:35deg"></span><span style="--x:44px;--y:44px;--r:-22deg"></span><span style="--x:12px;--y:76px;--r:32deg"></span><span style="--x:47px;--y:105px;--r:-18deg"></span><span style="--x:16px;--y:139px;--r:27deg"></span><span style="--x:49px;--y:172px;--r:-22deg"></span><span style="--x:20px;--y:205px;--r:23deg"></span><span style="--x:50px;--y:240px;--r:-20deg"></span><span style="--x:18px;--y:276px;--r:29deg"></span><span style="--x:47px;--y:315px;--r:-18deg"></span></div>
      <nav class="menu-list" aria-label="Navegação">
        <a class="menu-card" style="--i:0" href="convite.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M3 6h18v12H3z"/><path d="m3 7 9 7 9-7"/></svg></span><span class="sep"></span><span class="txt">Convite</span><span class="arr">›</span></a>
        <a class="menu-card" style="--i:1" href="cerimonia.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M12 3v5"/><path d="M10 5h4"/><path d="M5 21V10l7-5 7 5v11"/><path d="M9 21v-7h6v7"/></svg></span><span class="sep"></span><span class="txt">Cerimônia</span><span class="arr">›</span></a>
        <a class="menu-card" style="--i:2" href="festa.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M8 3h4l-1 8a3 3 0 1 1-2 0z"/><path d="M16 3h4l-1 8a3 3 0 1 1-2 0z"/><path d="M10 14v7"/><path d="M18 14v7"/></svg></span><span class="sep"></span><span class="txt">Festa</span><span class="arr">›</span></a>
        <a class="menu-card" style="--i:3" href="presentes.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M4 10h16v11H4z"/><path d="M3 7h18v3H3z"/><path d="M12 7v14"/><path d="M12 7c-3 0-5-1-5-3 0-1 1-2 2-2 2 0 3 3 3 5z"/><path d="M12 7c3 0 5-1 5-3 0-1-1-2-2-2-2 0-3 3-3 5z"/></svg></span><span class="sep"></span><span class="txt">Presentes</span><span class="arr">›</span></a>
        <a class="menu-card" style="--i:4" href="hospedagem.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M4 11V5"/><path d="M4 15h16"/><path d="M20 15v-4a3 3 0 0 0-3-3h-5v7"/><path d="M4 15v4"/><path d="M20 15v4"/><path d="M4 11h8"/></svg></span><span class="sep"></span><span class="txt">Hospedagem</span><span class="arr">›</span></a>
        <a class="menu-card" style="--i:5" href="transporte.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M5 17h14l-1-6H6z"/><path d="M7 17a2 2 0 1 0 0 4 2 2 0 0 0 0-4"/><path d="M17 17a2 2 0 1 0 0 4 2 2 0 0 0 0-4"/><path d="M7 11l2-4h6l2 4"/></svg></span><span class="sep"></span><span class="txt">Transporte</span><span class="arr">›</span></a>
        <a class="menu-card" style="--i:6" href="presenca.html"><span class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="m8 12 3 3 5-6"/></svg></span><span class="sep"></span><span class="txt">Presença</span><span class="arr">›</span></a>
        <a class="menu-card" style="--i:7" href="recados.html"><span class="icon"><svg viewBox="0 0 24 24"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg></span><span class="sep"></span><span class="txt">Recados</span><span class="arr">›</span></a>
      </nav>
    </section>
  </main>
  <script>
    const app = document.getElementById('app');
    const splash = document.getElementById('splash');
    function openInvite(){
      if(app.classList.contains('opening') || app.classList.contains('open')) return;
      app.classList.add('opening');
      setTimeout(()=>{ app.classList.add('open'); }, 980);
      setTimeout(()=>{ splash.style.display='none'; }, 1900);
    }
    splash.addEventListener('click', openInvite);
    splash.addEventListener('keydown', (e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openInvite(); } });
  </script>
</body>
</html>
